<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad Ciudadana CG</title>
    <!-- Agregar el enlace al favicon personalizado -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/WbKKyCLp/logocg-Photoroom.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://i.postimg.cc/dVsmL08N/Imagen-de-Whats-App-2025-04-01-a-las-11-02-50-2fabbf57.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            z-index: 2;
            animation: fadeIn 1s ease-out forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: #fff;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .input-group {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            font-size: 16px;
            color: #fff;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.3);
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .toggle-password:hover {
            color: #fff;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        .mensaje-error {
            color: #ff4d4d;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .mensaje-error.visible {
            opacity: 1;
        }

        .admin-link {
            text-align: center;
            margin-top: 15px;
        }

        .admin-link p {
            color: #fff;
            font-size: 14px;
        }

        .admin-link a {
            color: #00c6ff;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .admin-link a:hover {
            color: #fff;
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                max-width: 90%;
            }

            h2 {
                font-size: 24px;
            }

            input, button {
                font-size: 14px;
                padding: 10px 35px 10px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Iniciar Sesión Operario</h2>
        <div id="login-form">
            <div class="input-group">
                <input type="email" id="login-email" placeholder="Correo del Operario" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-password" placeholder="Contraseña" required>
                <span class="toggle-password" id="toggle-password">👁️</span>
            </div>
            <button id="login-button">Iniciar Sesión</button>
            <p id="mensaje-error" class="mensaje-error"></p>
        </div>
        <div class="admin-link">
            <p><span>¿Eres administrador?</span> <a href="login_admin.html">Inicia sesión aquí</a></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDe9s28ijKcxvZVat9LHRFphOwrgXJ6oF4",
            authDomain: "seguridad-ciudadana-cg.firebaseapp.com",
            databaseURL: "https://seguridad-ciudadana-cg-default-rtdb.firebaseio.com",
            projectId: "seguridad-ciudadana-cg",
            storageBucket: "seguridad-ciudadana-cg.firebasestorage.app",
            messagingSenderId: "1064543544376",
            appId: "1:1064543544376:web:4c15229918819cda9d72cd",
            measurementId: "G-4Y1SJ4ZVXP"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        const passwordInput = document.getElementById('login-password');
        const togglePassword = document.getElementById('toggle-password');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        });

        document.getElementById('login-button').addEventListener('click', () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const mensajeError = document.getElementById('mensaje-error');

            if (!email || !password) {
                mensajeError.textContent = "Por favor, completa todos los campos.";
                mensajeError.classList.add('visible');
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    return database.ref('operarios/' + user.uid).once('value');
                })
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        // Verificar si roles es un arreglo o un string
                        const roles = userData.roles;
                        const hasOperarioRole = Array.isArray(roles) ? roles.includes('operador') : roles === 'operador';
                        if (hasOperarioRole) {
                            console.log("Inicio de sesión exitoso como operario. Redirigiendo...");
                            window.location.href = "inicio_operario.html"; // Cambiado a inicio_operario.html
                        } else {
                            mensajeError.textContent = "Acceso denegado. No tienes permisos de operario.";
                            mensajeError.classList.add('visible');
                            // Cerrar sesión si no tiene permisos
                            auth.signOut();
                        }
                    } else {
                        mensajeError.textContent = "Error: No se encontraron datos del usuario.";
                        mensajeError.classList.add('visible');
                        // Cerrar sesión si no se encuentran datos
                        auth.signOut();
                    }
                })
                .catch((error) => {
                    if (error.code === 'auth/invalid-login-credentials' || error.code === 'auth/wrong-password') {
                        mensajeError.textContent = "La contraseña es incorrecta.";
                    } else if (error.code === 'auth/user-not-found') {
                        mensajeError.textContent = "El correo no está registrado.";
                    } else {
                        mensajeError.textContent = "Error al iniciar sesión: " + error.message;
                    }
                    mensajeError.classList.add('visible');
                    console.error("Error en el inicio de sesión:", error);
                });
        });
    </script>
</body>
</html>
