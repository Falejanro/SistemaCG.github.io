<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seguridad Ciudadana CG - Login Administrador</title>
    <link rel="icon" href="https://i.postimg.cc/WbKKyCLp/logocg-Photoroom.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet" />
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Orbitron", sans-serif;
            height: 100vh;
            background: #080818;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: white;
        }

        /*Estrellas de fondo*/
        .stars {
            position: absolute;
            inset: 0;
            background: transparent;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: star-fall linear infinite;
            filter: drop-shadow(0 0 3px white);
        }

        @keyframes twinkle {
            0% {
                opacity: 1;
                transform: scale(1.4);
            }

            100% {
                opacity: 1;
                transform: scale(1.4);
            }
        }

        /* Lluvia animada con varios colores */
        .rain {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .rain .drop {
            position: absolute;
            bottom: 100%;
            width: 3px;
            height: 28px;
            opacity: 0.9;
            border-radius: 50%;
            filter: drop-shadow(0 0 6px);
            animation: fall linear infinite;
        }

        .rain .drop:nth-child(odd) {
            background: #00ffea;
            filter: drop-shadow(0 0 8px #00ffd1);
        }

        .rain .drop:nth-child(even) {
            background: #3af7c9;
            filter: drop-shadow(0 0 8px #2affbb);
        }

        .rain .drop:nth-child(3n) {
            background: #00bfff;
            filter: drop-shadow(0 0 8px #0097ff);
        }

        .rain .drop:nth-child(4n) {
            background: #00ff9c;
            filter: drop-shadow(0 0 8px #00d476);
        }

        @keyframes fall {
            to {
                transform: translateY(120vh);
                opacity: 0;
            }
        }

        .rain .drop:nth-child(1) {
            left: 3%;
            animation-duration: 1.0s;
            animation-delay: 0s;
        }

        .rain .drop:nth-child(2) {
            left: 7%;
            animation-duration: 1.3s;
            animation-delay: 0.2s;
        }

        .rain .drop:nth-child(3) {
            left: 11%;
            animation-duration: 1.1s;
            animation-delay: 0.3s;
        }

        .rain .drop:nth-child(4) {
            left: 15%;
            animation-duration: 1.4s;
            animation-delay: 0.5s;
        }

        .rain .drop:nth-child(5) {
            left: 19%;
            animation-duration: 1.0s;
            animation-delay: 0.7s;
        }

        .rain .drop:nth-child(6) {
            left: 23%;
            animation-duration: 1.2s;
            animation-delay: 0.4s;
        }

        .rain .drop:nth-child(7) {
            left: 27%;
            animation-duration: 1.5s;
            animation-delay: 0.8s;
        }

        .rain .drop:nth-child(8) {
            left: 31%;
            animation-duration: 1.3s;
            animation-delay: 0.1s;
        }

        .rain .drop:nth-child(9) {
            left: 35%;
            animation-duration: 1.0s;
            animation-delay: 0.9s;
        }

        .rain .drop:nth-child(10) {
            left: 39%;
            animation-duration: 1.4s;
            animation-delay: 0.3s;
        }

        .rain .drop:nth-child(11) {
            left: 43%;
            animation-duration: 1.2s;
            animation-delay: 0.6s;
        }

        .rain .drop:nth-child(12) {
            left: 47%;
            animation-duration: 1.0s;
            animation-delay: 0.2s;
        }

        .rain .drop:nth-child(13) {
            left: 51%;
            animation-duration: 1.3s;
            animation-delay: 0.7s;
        }

        .rain .drop:nth-child(14) {
            left: 55%;
            animation-duration: 1.1s;
            animation-delay: 0.4s;
        }

        .rain .drop:nth-child(15) {
            left: 59%;
            animation-duration: 1.5s;
            animation-delay: 0.5s;
        }

        .rain .drop:nth-child(16) {
            left: 63%;
            animation-duration: 1.2s;
            animation-delay: 0.9s;
        }

        .rain .drop:nth-child(17) {
            left: 67%;
            animation-duration: 1.3s;
            animation-delay: 0.1s;
        }

        .rain .drop:nth-child(18) {
            left: 71%;
            animation-duration: 1.0s;
            animation-delay: 0.3s;
        }

        .rain .drop:nth-child(19) {
            left: 75%;
            animation-duration: 1.4s;
            animation-delay: 0.6s;
        }

        .rain .drop:nth-child(20) {
            left: 79%;
            animation-duration: 1.1s;
            animation-delay: 0.8s;
        }

        .rain .drop:nth-child(21) {
            left: 83%;
            animation-duration: 1.2s;
            animation-delay: 0.4s;
        }

        .rain .drop:nth-child(22) {
            left: 87%;
            animation-duration: 1.5s;
            animation-delay: 0.5s;
        }

        .rain .drop:nth-child(23) {
            left: 91%;
            animation-duration: 1.3s;
            animation-delay: 0.7s;
        }

        .rain .drop:nth-child(24) {
            left: 95%;
            animation-duration: 1.0s;
            animation-delay: 0.2s;
        }

        .rain .drop:nth-child(25) {
            left: 99%;
            animation-duration: 1.4s;
            animation-delay: 0.4s;
        }

        .scanner-bar {
            position: absolute;
            top: 50%;
            left: -60%;
            width: 160%;
            height: 7px;
            background: linear-gradient(90deg,
                    transparent,
                    #00ffea,
                    #00bfff,
                    #00ff9c,
                    #00bfff,
                    #00ffea,
                    transparent);
            transform: skewX(-25deg);
            animation: scanner-move 2s linear infinite;
            z-index: 3;
            pointer-events: none;
            filter: drop-shadow(0 0 20px #00ffe3);
        }

        @keyframes scanner-move {
            0% {
                left: -60%;
            }

            100% {
                left: 160%;
            }
        }

        .login-wrapper {
            position: relative;
            z-index: 4;
            display: flex;
            max-width: 900px;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            background: transparent;
        }

        .login-left {
            flex: 1;
            padding: 50px;
            background: rgba(72, 77, 73, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            z-index: 5;
        }

        .login-left h2 {
            font-size: 28px;
            text-align: center;
            color: white;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00f7ff;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 14px;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #00f7ff;
            user-select: none;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #00f7ff, #0066ff);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        .login-button:hover {
            box-shadow: 0 0 25px #00f7ff;
        }

        .admin-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }

        .admin-link a {
            color: #00f7ff;
            text-decoration: none;
        }

        .mensaje-error {
            font-size: 14px;
            color: #ff4d4d;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        .mensaje-error.visible {
            display: block;
        }

        .login-right {
            flex: 1;
            background:
                linear-gradient(135deg, rgba(55, 52, 52, 0.3), rgba(20, 0, 40, 0.4)),
                url('https://i.postimg.cc/y8mYgZTW/469543015-122197867952199417-5133693577498087596-n-Photoroom-1.png') no-repeat center center / cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            backdrop-filter: blur(12px);
        }

        .login-right h1 {
            font-size: 40px;
            color: white;
            text-shadow: 0 0 10px #00f7ff;
        }

        .login-right p {
            max-width: 300px;
            text-align: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
            text-shadow: 0 0 15px #0f8a8a;
            margin-top: 15px;
        }

        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
            }

            .login-right {
                display: none;
            }
        }

        /* Modal de carga */
        .login-modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .login-modal.active {
            display: flex;
        }

        .login-modal-content {
            background: #111827;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }

        .login-modal-content p {
            margin-top: 15px;
            font-size: 16px;
            color: #00f7ff;
            text-shadow: 0 0 8px #00f7ff;
            font-weight: 600;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid transparent;
            border-top: 4px solid #00f7ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 8px #00f7ff);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        #forgot-password-link {
            color: yellowgreen;
            text-decoration: underline;
            margin-top: 18px; /* Puedes ajustar el valor */
            display: inline-block;
        }
    </style>
</head>

<body>

    <!-- Estrellas de fondo -->
    <div class="stars"></div>

    <!-- Lluvia animada con gotas multicolor -->
    <div class="rain">
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
        <div class="drop"></div>
    </div>

    <!-- Barra de escáner horizontal -->
    <div class="scanner-bar"></div>

    <div class="login-wrapper">
        <div class="login-left">
            <h2> Iniciar Sesión como administrador</h2>
            <div class="input-group">
                <input type="email" id="admin-login-email" placeholder="Correo electrónico" required
                    autocomplete="off" />
            </div>
            <div class="input-group">
                <input type="password" id="admin-login-password" placeholder="Contraseña" required autocomplete="off" />
                <span class="toggle-password" id="toggle-password">👁️</span>
            </div>
            <button class="login-button" id="admin-login-button">Iniciar Sesión</button>
            <p id="mensaje-error" class="mensaje-error"></p>
            <a href="#" id="forgot-password-link" style="cursor:pointer;">¿Olvidaste tu contraseña?</a>
        </div>
        <div class="login-right">
            <!-- Puedes agregar contenido de bienvenida aquí -->
        </div>
        <!-- Modal de carga -->
        <div id="login-modal" class="login-modal">
            <div class="login-modal-content">
                <div class="loader-spinner"></div>
                <p>Iniciando sesión...</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDe9s28ijKcxvZVat9LHRFphOwrgXJ6oF4",
            authDomain: "seguridad-ciudadana-cg.firebaseapp.com",
            databaseURL: "https://seguridad-ciudadana-cg-default-rtdb.firebaseio.com",
            projectId: "seguridad-ciudadana-cg",
            storageBucket: "seguridad-ciudadana-cg.appspot.com",
            messagingSenderId: "1064543544376",
            appId: "1:1064543544376:web:4c15229918819cda9d72cd",
            measurementId: "G-4Y1SJ4ZVXP",
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        const passwordInput = document.getElementById("admin-login-password");
        const togglePassword = document.getElementById("toggle-password");
        const loginModal = document.getElementById("login-modal");
        const loginButton = document.getElementById("admin-login-button");

        togglePassword.addEventListener("click", () => {
            const type =
                passwordInput.getAttribute("type") === "password" ? "text" : "password";
            passwordInput.setAttribute("type", type);
            togglePassword.textContent = type === "password" ? "👀" : "🔍";
        });

        loginButton.addEventListener("click", () => {
            const email = document.getElementById("admin-login-email").value.trim();
            const password = document.getElementById("admin-login-password").value;
            const mensajeError = document.getElementById("mensaje-error");

            mensajeError.style.color = "#ff4d4d";
            mensajeError.classList.remove("visible");
            mensajeError.textContent = "";

            if (!email || !password) {
                mensajeError.textContent = "Por favor, completa todos los campos.";
                mensajeError.classList.add("visible");
                return;
            }

            loginButton.disabled = true;
            loginModal.classList.add("active");

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    return database.ref("operarios/" + user.uid).once("value");
                })
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        if (userData.estado === "Inactivo") {
                            mensajeError.textContent =
                                "Tu cuenta está desactivada. Contacta al administrador.";
                            mensajeError.classList.add("visible");
                            auth.signOut();
                            return;
                        }
                        const roles = userData.roles;
                        const esAdmin =
                            (Array.isArray(roles) && roles.includes("administrador")) ||
                            roles === "administrador";

                        if (esAdmin) {
                            window.location.href = "inicio_admin.html";
                        } else {
                            mensajeError.textContent =
                                "Acceso denegado. No tienes permisos de administrador.";
                            mensajeError.classList.add("visible");
                            auth.signOut();
                        }
                    } else {
                        mensajeError.textContent = "No se encontraron datos del usuario.";
                        mensajeError.classList.add("visible");
                        auth.signOut();
                    }
                })
                .catch((error) => {
                    switch (error.code) {
                        case "auth/wrong-password":
                            mensajeError.textContent = "La contraseña es incorrecta.";
                            break;
                        case "auth/user-not-found":
                            mensajeError.textContent = "El correo no está registrado.";
                            break;
                        default:
                            mensajeError.textContent = "Error al iniciar sesión: " + error.message;
                    }
                    mensajeError.classList.add("visible");
                    console.error("Error en el inicio de sesión:", error);
                })
                .finally(() => {
                    loginModal.classList.remove("active");
                    loginButton.disabled = false;
                });
        });

        document
            .getElementById("forgot-password-link")
            .addEventListener("click", (e) => {
                e.preventDefault();
                const email = document.getElementById("admin-login-email").value.trim();
                const mensajeError = document.getElementById("mensaje-error");
                mensajeError.style.color = "#ff4d4d";
                mensajeError.classList.remove("visible");
                mensajeError.textContent = "";

                if (!email) {
                    mensajeError.textContent =
                        "Por favor, ingresa tu correo para restablecer la contraseña.";
                    mensajeError.classList.add("visible");
                    return;
                }

                auth.sendPasswordResetEmail(email)
                    .then(() => {
                        mensajeError.textContent =
                            "Se ha enviado un correo para restablecer tu contraseña.";
                        mensajeError.style.color = "#2ecc71";
                        mensajeError.classList.add("visible");
                    })
                    .catch((error) => {
                        mensajeError.textContent =
                            "Error al enviar el correo de restablecimiento: " + error.message;
                        mensajeError.style.color = "#ff4d4d";
                        mensajeError.classList.add("visible");
                    });
            });

        // Generar estrellas aleatorias en el fondo
        const starsContainer = document.querySelector(".stars");
        const starCount = 150;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement("div");
            star.classList.add("star");
            const size = Math.random() * 2 + 1;
            star.style.width = size + "px";
            star.style.height = size + "px";
            star.style.top = Math.random() * 100 + "%";
            star.style.left = Math.random() * 100 + "%";
            star.style.animationDuration = (2 + Math.random() * 3) + "s";
            starsContainer.appendChild(star);
        }
    </script>
</body>

</html>
